name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: |
        # This finds the pom.xml wherever it is and runs Maven there
        POM_PATH=$(find . -name "pom.xml" | head -n 1)
        echo "Found POM at: $POM_PATH"
        mvn -f "$POM_PATH" clean install

    - name: Test Report
      uses: dorny/test-reporter@v2
      if: always()
      with:
        name: Maven Tests
        # The ** ensures it finds the reports even if folder names differ
        path: '**/target/surefire-reports/**/*.xml'
        reporter: java-junit