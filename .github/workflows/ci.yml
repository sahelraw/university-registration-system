name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn clean install
    - name: Debug - List target directory
      run: find target -name "*.xml" -type f 2>/dev/null || echo "No XML files found in target"
    # Optional: Keep test results (surefire report files are under target/surefire-reports)
    - name: Test Report
      uses: dorny/test-reporter@v2
      if: always()
      with:
        name: Maven Tests
        path: 'university-registration-system/target/surefire-reports/**/*.xml'
        reporter: java-junit